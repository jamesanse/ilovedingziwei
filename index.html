<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这不是木马</title>
    <link rel="stylesheet" href="style.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Music Control Button -->
    <button class="music-btn" id="musicBtn" title="Toggle Music">🎵</button>
    <div class="song-name">都是你 - PG One</div>

    <!-- Site Header -->
    <h1 class="site-title">这不是木马</h1>

    <!-- Daily Calendar Section -->
    <div class="daily-section">
        <h2 class="daily-title">每天打卡 - 女主养成</h2>
        <div class="daily-month" id="dailyMonth"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Daily Upload Modal -->
    <div class="daily-modal" id="dailyModal">
        <div class="daily-modal-content">
            <button class="daily-modal-close" id="dailyModalClose">&times;</button>
            <p class="daily-task">发一篇关于你去过地方的小红书， 配上美图和文字</p>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <button class="daily-upload-btn" id="dailyUploadBtn">完成任务并上传图片证明</button>
            <p class="upload-status" id="uploadStatus"></p>
        </div>
    </div>

    <div class="container">
        <div class="envelope" id="envelope">
            <svg class="envelope-svg" fill="#ff69b4" viewBox="0 0 45.805 45.805" xmlns="http://www.w3.org/2000/svg">
                <g>
                    <g>
                        <path d="M22.903,21.465c-1.57-1.558-4.105-1.554-5.671,0.012c-1.568,1.568-1.568,4.112,0,5.682c0.076,0.077,3.8,3.782,5.171,5.146
                            c0.276,0.274,0.724,0.274,1,0c1.371-1.364,5.095-5.069,5.171-5.146c1.568-1.569,1.568-4.113,0-5.682
                            C27.009,19.913,24.475,19.908,22.903,21.465z"/>
                        <path d="M42.113,6.583c-0.454-0.13-0.93-0.196-1.405-0.197L5.114,6.355c-0.475,0-0.96,0.082-1.414,0.212
                            C1.522,7.191-0.002,9.218,0,11.485l0.025,22.866c0.001,1.363,0.532,2.645,1.497,3.607c0.964,0.961,2.245,1.49,3.608,1.489
                            l35.54,0.001c1.362,0.001,2.645-0.527,3.607-1.488c0.966-0.963,1.498-2.244,1.5-3.605l0.027-22.863
                            C45.809,9.226,44.291,7.207,42.113,6.583z M3.841,32.902L3.816,13.035l9.1,10.416L3.841,32.902z M6.522,35.676l8.668-9.051
                            c-0.851-1.807-0.646-3.99,0.615-5.615c-4.335-4.954-9.39-10.756-9.39-10.756h32.969c0,0-5.071,5.776-9.403,10.73
                            c1.279,1.629,1.49,3.827,0.633,5.645l8.688,9.047H6.522z M41.959,32.902l-9.074-9.451l9.1-10.416L41.959,32.902z"/>
                    </g>
                </g>
            </svg>
            <div class="envelope-content">
                <p class="envelope-text">给宝宝的忠告</p>
                <p class="envelope-date">2026.06.28</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <div class="love-letter">
                <h2>给宝宝的忠告</h2>
                <p>
                    你说<br>
                    看过的消息都会删掉<br>
                    <br>
                    所以<br>
                    我买下了这个域名<br>
                    <br>
                    只想让你知道<br>
                    我的爱<br>
                    永远没有删除键<br>
                    <br>
                    你说<br>
                    现实治好了你的恋爱脑<br>
                    <br>
                    我现在只想知道<br>
                    你的心<br>
                    有没有为我动摇过一秒<br>
                    <br>
                    生病那天<br>
                    我看清了生命的有限<br>
                    <br>
                    因为害怕来不及<br>
                    我把这里买下了九十九年<br>
                    <br>
                    就算有一天<br>
                    我先退场了<br>
                    <br>
                    世界上也还有一个地方<br>
                    锁着<br>
                    只属于你和我的秘密<br>
                </p>
                <p style="text-align: right; margin-top: 2rem;">
                    只有你知道我是谁<br>
                    ❤️
                </p>
            </div>
        </div>
    </div>

    <!-- Camera Roll -->
    <div class="camera-roll">
        <div class="swiper" id="cameraRoll">
            <div class="swiper-wrapper" id="swiperWrapper">
                <!-- Images will be added here dynamically -->
            </div>
        </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <!-- Modular JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/music.js"></script>
    <script src="js/carousel.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
